services:
  edge:
    container_name: edge-app
    image: ghcr.io/bavin03032003/edge_git:latest
    # Support ARM64 and AMD64 via fallback platform
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    restart: unless-stopped
    ports:
      - "${WEB_UI_PORT:-5001}:${WEB_UI_PORT:-5001}"
      - "3000:3000"
    volumes:
      # Use environment variables for paths to support both Linux (/opt/edge) and Windows (C:/edge)
      - ${LOGS_DIR:-./logs}:/app/logs
      - ${ENV_FILE:-.env}:/app/.env
      # The GHCR image is started through this script; keep the host copy in Linux LF format.
      - ./docker-entrypoint.sh:/app/docker-entrypoint.sh:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DOCKER_CONTAINER=true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "/app/edge-app-binary", "--health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  updater:
    image: containrrr/watchtower
    container_name: edge-updater
    platform: ${DOCKER_DEFAULT_PLATFORM:-linux/amd64}
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./watchtower-auth.json:/config.json:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_POLL_INTERVAL:-30}
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_MONITOR_ONLY=${IS_MANUAL_UPDATE:-0}
      - DOCKER_API_VERSION=1.44
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
